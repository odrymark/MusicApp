name: CI
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ConnectionStrings__DefaultConnection: ${{ secrets.NEON_STAGING_CONNECTION_STRING }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Install required tools
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-reportgenerator-globaltool
          dotnet tool install --global dotnet-ef
      - name: Restore dependencies
        run: dotnet restore server/server.sln
      - name: Start static code analysis
        run: |
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONARQUBE_KEY }}" \
            /d:sonar.host.url="${{ secrets.SONARQUBE_URL }}" \
            /d:sonar.token="${{ secrets.SONARQUBE_TOKEN }}" \
            /d:sonar.coverageReportPaths="coverage-report/SonarQube.xml" \
            /d:sonar.qualitygate.wait=false \
            /d:sonar.qualitygate.timeout=300
      - name: Build
        run: dotnet build server/server.sln --configuration Release --no-restore
      - name: Run tests
        run: |
          dotnet test server/server.sln \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults
      - name: Generate coverage report for SonarQube
        run: |
          reportgenerator \
            -reports:TestResults/**/coverage.cobertura.xml \
            -targetdir:coverage-report \
            -reporttypes:SonarQube
      - name: Complete static code analysis
        run: |
          dotnet sonarscanner end \
            /d:sonar.token="${{ secrets.SONARQUBE_TOKEN }}"

  deploy-staging-db:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef
      - name: Restore dependencies
        run: dotnet restore server/server.sln
      - name: Build
        run: dotnet build server/server.sln --configuration Release --no-restore
      - name: Generate migration bundle
        run: |
          dotnet ef migrations bundle \
            --project server/DataAccess \
            --startup-project server/Api \
            --configuration Release \
            --output migration-bundle \
            --self-contained
      - name: Apply migrations to staging
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.NEON_STAGING_CONNECTION_STRING }}
        run: ./migration-bundle --connection "${{ secrets.NEON_STAGING_CONNECTION_STRING }}"

  k6-load-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging-db
    if: github.event_name == 'pull_request'
    environment: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore server/server.sln

      - name: Build API
        run: dotnet build server/server.sln --configuration Debug --no-restore

      - name: Write R2 config file
        run: |
          echo '${{ secrets.R2_CONFIG_JSON }}' > ${{ secrets.R2_CONFIG_PATH }}

      - name: Start API
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.NEON_STAGING_CONNECTION_STRING }}
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://localhost:5249
          Jwt__Key: ${{ secrets.JWT_KEY }}
          Jwt__Issuer: ${{ secrets.JWT_ISSUER }}
          Jwt__Audience: ${{ secrets.JWT_AUDIENCE }}
          R2__ConfigPath: ${{ secrets.R2_CONFIG_PATH }}
        run: |
          dotnet run \
            --project server/Api \
            --configuration Debug \
            --no-build > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5249/api/song/getSongs > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 2s..."
            sleep 2
          done
          echo "API did not start in time"
          echo "=== API Logs ==="
          cat api.log
          exit 1

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run auth load test
        run: |
          k6 run k6/auth_test.js \
            --env BASE_URL=http://localhost:5249

      - name: Run song load test
        run: |
          k6 run k6/song_test.js \
            --env BASE_URL=http://localhost:5249

      - name: Stop API
        if: always()
        run: kill $(cat api.pid) || true

  testcafe-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging-db
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: client

      - name: Build frontend
        run: npm run build
        working-directory: client

      - name: Start frontend
        run: |
          npm run preview -- --port 5173 &
          echo $! > frontend.pid
        working-directory: client

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Attempt $i/15 - waiting 2s..."
            sleep 2
          done
          echo "Frontend did not start in time"
          exit 1

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run TestCafe tests
        run: |
          npx testcafe chrome:headless \
            ../testcafe/home_test.js \
            ../testcafe/upload_song_test.js \
            --screenshots takeOnFails \
            --screenshots-path ../testcafe-screenshots
        working-directory: client

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testcafe-screenshots
          path: testcafe-screenshots

      - name: Stop frontend
        if: always()
        run: kill $(cat client/frontend.pid) || true

  deploy-production-db:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef
      - name: Restore dependencies
        run: dotnet restore server/server.sln
      - name: Build
        run: dotnet build server/server.sln --configuration Release --no-restore
      - name: Generate migration bundle
        run: |
          dotnet ef migrations bundle \
            --project server/DataAccess \
            --startup-project server/Api \
            --configuration Release \
            --output migration-bundle \
            --self-contained
      - name: Apply migrations to production
        run: ./migration-bundle --connection "${{ secrets.NEON_PRODUCTION_CONNECTION_STRING }}"
