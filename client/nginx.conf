server {
    listen 443 ssl http2;
    server_name musicapp-devops.duckdns.org;

    ssl_certificate /config/etc/letsencrypt/live/musicapp-devops.duckdns.org/fullchain.pem;
    ssl_certificate_key /config/etc/letsencrypt/live/musicapp-devops.duckdns.org/privkey.pem;

    include /config/nginx/ssl.conf;

    location / {
        proxy_pass http://client:5173; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://api:8080/api/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        client_max_body_size 50M; 
    }
}