version: '3.8'

services:
  api:
    image: api
    build:
      context: .
      dockerfile: Api/Dockerfile
    depends_on:
      featurehub:
        condition: service_started
    networks:
      - app-network
    ports:
      - 8080:8080
      - 8081:8081
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  featurehub:
    image: featurehub/party-server:latest
    restart: always
    volumes:
      - ./featurehub:/db
    ports:
      - 8085:8085
    networks:
      - app-network
    environment:
      - LOGGING_LEVEL_IO_FEATUREHUB=DEBUG
      - PORT=8085

networks:
  app-network:
    driver: bridge