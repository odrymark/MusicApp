version: '3.8'

services:
  api:
    image: api
    build:
      context: ./server
      dockerfile: Api/Dockerfile
    depends_on:
      featurehub:
        condition: service_started
    networks:
      - app-network
    ports:
      - 8080:8080
      - 8081:8081
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  featurehub:
    image: featurehub/party-server:latest
    restart: always
    volumes:
      - ./server/featurehub:/db
    ports:
      - 8085:8085
    networks:
      - app-network
    environment:
      - LOGGING_LEVEL_IO_FEATUREHUB=DEBUG
      - PORT=8085

  client:
    image: client
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - 443:443
    networks:
      - app-network
    depends_on:
      - api

networks:
  app-network:
    driver: bridge