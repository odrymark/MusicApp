version: '3.8'

services:
  gateway:
    image: nginx:alpine
    container_name: gateway
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 80:80
    restart: always
    networks:
      - app-network
    depends_on:
      - client
      - api

  api:
    image: ghcr.io/odrymark/musicapp/api:latest
    build:
      context: ./server
      dockerfile: Api/Dockerfile
    networks:
      - app-network
    expose:
      - 8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${CONNECTIONSTRINGS__DEFAULTCONNECTION}
      - Jwt__Key=${JWT__KEY}
      - Jwt__Issuer=${JWT__ISSUER}
      - Jwt__Audience=${JWT__AUDIENCE}
      - Jwt__ExpireMinutes=${JWT__EXPIREMINUTES}
      - RefreshToken__ExpireDays=${REFRESHTOKEN__EXPIREDAYS}
      - R2__AccessKey=${R2__ACCESSKEY}
      - R2__SecretKey=${R2__SECRETKEY}
      - R2__BucketName=${R2__BUCKETNAME}
      - R2__Endpoint=${R2__ENDPOINT}
      - FeatureHub__Url=${FEATUREHUB__URL}
      - FeatureHub__SdkKey=${FEATUREHUB__SDKKEY}
    restart: always

  client:
    image: ghcr.io/odrymark/musicapp/client:latest
    build:
      context: ./client
      dockerfile: Dockerfile
    networks:
      - app-network
    expose:
      - 5173
    depends_on:
      - api
    restart: always

  featurehub:
    image: featurehub/party-server:latest
    restart: always
    volumes:
      - ./server/featurehub:/db
    networks:
      - app-network
    environment:
      - PORT=8085

networks:
  app-network:
    driver: bridge
