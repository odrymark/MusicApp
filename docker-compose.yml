version: '3.8'

services:
  api:
    image: ghcr.io/odrymark/musicapp/api:latest
    build:
      context: ./server
      dockerfile: Api/Dockerfile
    depends_on:
      featurehub:
        condition: service_started
    networks:
      - app-network
    ports:
      - 8080:8080
      - 8081:8081
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=${CONNECTIONSTRINGS__DEFAULTCONNECTION}
      - Jwt__Key=${JWT__KEY}
      - Jwt__Issuer=${JWT__ISSUER}
      - Jwt__Audience=${JWT__AUDIENCE}
      - Jwt__ExpireMinutes=${JWT__EXPIREMINUTES}
      - RefreshToken__ExpireDays=${REFRESHTOKEN__EXPIREDAYS}
      - R2__AccessKey=${R2__ACCESSKEY}
      - R2__SecretKey=${R2__SECRETKEY}
      - R2__BucketName=${R2__BUCKETNAME}
      - R2__Endpoint=${R2__ENDPOINT}
      - FeatureHub__Url=${FEATUREHUB__URL}
      - FeatureHub__SdkKey=${FEATUREHUB__SDKKEY}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  featurehub:
    image: featurehub/party-server:latest
    restart: always
    volumes:
      - ./server/featurehub:/db
    ports:
      - 8085:8085
    networks:
      - app-network
    environment:
      - PORT=8085

  client:
    image: ghcr.io/odrymark/musicapp/client:latest
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - 443:443
    networks:
      - app-network
    depends_on:
      - api
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
